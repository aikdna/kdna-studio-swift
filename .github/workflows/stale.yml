name: "Close stale issues and PRs"

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: "This issue is stale because it has been open for 60 days with no activity. Remove the stale label or comment, or it will be closed in 7 days."
          close-issue-message: "This issue was closed because it has been inactive for 7 days since being marked as stale."

          days-before-pr-stale: 45
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: "This PR is stale because it has been open for 45 days with no activity. Remove the stale label or comment, or it will be closed in 7 days."
          close-pr-message: "This PR was closed because it has been inactive for 7 days since being marked as stale."

          exempt-issue-labels: "pinned,security,blocking"
          exempt-pr-labels: "pinned,security,blocking"
